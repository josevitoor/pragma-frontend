<tce-container>
  <tce-container-header title="Modelagem Relacional" [showBtn]="false"></tce-container-header>

  <main class="mt-3">
    <form [formGroup]="resourceForm">
      <ng-template matStepLabel>Configurar Geraração de Código</ng-template>
      <div class="mt-3">
        <div class="mt-2 mb-2 d-flex justify-content-between align-items-center flex-wrap">
          <div class="d-flex flex-wrap align-items-center gap-2">
            <span class="badge bg-info"><strong>PK</strong> - Chave primária</span>
            <span class="badge bg-info ml-2"><strong>FK</strong> - Chave estrangeira</span>
            <span class="badge bg-info ml-2"><strong>NN</strong> - Não nulo</span>
            <span class="badge bg-info ml-2"><strong>UQ</strong> - Único</span>
            <span class="badge bg-info ml-2"><strong>AI</strong> - Auto incremento</span>
          </div>
          <div class="d-flex flex-wrap justify-content-end gap-2">
            <button type="button" class="btn btn-secondary" (click)="importInput.click()">
              Importar SQL
            </button>
            <input type="file" hidden #importInput (change)="importSql($event)" accept=".sql" />
            <button type="button" class="btn btn-secondary ml-2" (click)="fileInput.click()">
              Abrir
            </button>
            <input type="file"#fileInput hidden accept=".json" (change)="openDiagram($event)"/>
            <button type="button" class="btn btn-warning ml-2" (click)="gerarSqlPreview()">
              Gerar SQL
            </button>
            <button type="button" class="btn btn-primary ml-2" (click)="saveDiagram()">
              Salvar
            </button>
            <button type="button" class="btn btn-info ml-2" (click)="addTable()">
              Adicionar tabela
            </button>
          </div>
        </div>

        <div id="diagramDiv" style="width: 100%; height: 500px; border: 1px solid #ccc;"></div>
      </div>

      <div *ngIf="sqlGerado" #sqlSection class="mt-3">
        <div class="script-header d-flex justify-content-between align-items-center">
          <span>Script SQL Gerado</span>
          <div class="d-flex align-items-center">
            <button class="btn btn-sm btn-outline-light mr-2" (click)="copySql()">
              <fa-icon [icon]="['fas', 'copy']"></fa-icon>
            </button>
            <button class="btn btn-sm btn-outline-light" (click)="downloadSql()">
              <fa-icon [icon]="['fas', 'download']"></fa-icon>
            </button>
          </div>
        </div>
        <textarea
          class="script-area"
          [value]="sqlGerado"
          readonly
        ></textarea>
      </div>

      <div class="mt-3 d-flex justify-content-end flex-wrap">
        <button type="button" class="btn btn-primary mr-2 w-100 w-sm-auto mb-2 mb-sm-0" (click)="goToGeracao()">
          GERAR ARQUIVOS A PARTIR DA MODELAGEM
        </button>
      </div>
    </form>
  </main>
</tce-container>
