<tce-container>
  <tce-container-header title="Modelador de Diagrama Entidade-Relacionamento" [showBtn]="false"></tce-container-header>

  <main class="mt-3">
    <form [formGroup]="resourceForm">
      <ng-template matStepLabel>Configurar Geraração de Código</ng-template>
      <div class="mt-3">
        <div class="mt-2 mb-2 d-flex justify-content-end flex-wrap gap-2">
          <button class="btn btn-secondary ml-2" (click)="fileInput.click()">
            Importar SQL
          </button>
          <input type="file" hidden #fileInput (change)="importSql($event)" accept=".sql" />

          <button class="btn btn-warning ml-2" (click)="gerarSqlPreview()">
            Gerar SQL
          </button>

          <button class="btn btn-primary ml-2" (click)="addTable()">
            Adicionar tabela
          </button>
        </div>

        <div id="diagramDiv" style="width: 100%; height: 500px; border: 1px solid #ccc;"></div>
      </div>

      <div *ngIf="sqlGerado" #sqlSection class="mt-3">
        <div class="script-header d-flex justify-content-between align-items-center">
          <span>Script SQL Gerado</span>
          <div class="d-flex align-items-center">
            <button class="btn btn-sm btn-outline-light mr-2" (click)="copiarSql()">
              <fa-icon [icon]="['fas', 'copy']"></fa-icon>
            </button>
            <button class="btn btn-sm btn-outline-light" (click)="downloadSql()">
              <fa-icon [icon]="['fas', 'download']"></fa-icon>
            </button>
          </div>
        </div>
        <textarea
          class="script-area"
          [value]="sqlGerado"
          readonly
        ></textarea>
      </div>

      <div class="mt-3 d-flex justify-content-end flex-wrap">
        <button class="btn btn-primary mr-2 w-100 w-sm-auto mb-2 mb-sm-0">
          GERAR ARQUIVOS A PARTIR DA MODELAGEM
        </button>
      </div>
    </form>
  </main>
</tce-container>
