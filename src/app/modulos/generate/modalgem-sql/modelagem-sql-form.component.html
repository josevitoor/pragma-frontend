<tce-container>
  <tce-container-header title="Modelagem por Script SQL" [showBtn]="false"></tce-container-header>

  <main class="mt-3">
    <form [formGroup]="resourceForm">
      <div class="d-flex justify-content-end align-items-center flex-wrap mb-2">
        <div>
          <button type="button" class="btn btn-warning" (click)="fileInput.click()">
            Importar SQL
          </button>
          <input type="file" hidden #fileInput (change)="importSql($event)" accept=".sql" />
        </div>
      </div>

      <div class="script-container">
        <div class="script-header d-flex justify-content-between align-items-center">
          <span>Script SQL</span>
          <div class="d-flex align-items-center">
            <button type="button" class="btn btn-sm btn-outline-light mr-2" (click)="copySql()">
              <fa-icon [icon]="['fas', 'copy']"></fa-icon>
            </button>
            <button type="button" class="btn btn-sm btn-outline-light" (click)="downloadSql()">
              <fa-icon [icon]="['fas', 'download']"></fa-icon>
            </button>
          </div>
        </div>

        <textarea
          class="script-area"
          formControlName="sqlScript"
          placeholder="Cole ou escreva seu script SQL aqui..."
        ></textarea>
      </div>

      <div class="mt-3 d-flex justify-content-end flex-wrap">
        <button
          type="button"
          class="btn btn-primary w-100 w-sm-auto"
          (click)="goToGeracao()"
        >
          GERAR ARQUIVOS A PARTIR DO SCRIPT
        </button>
      </div>
    </form>
  </main>
</tce-container>
